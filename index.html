<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cerveja e farra 💖</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ff6b81;
      color: white;
      font-size: 16px;
    }

    button:hover {
      background: #ff4757;
    }
  </style>
</head>

<body>

<div class="box">
  <h2 id="texto">Como cortamos o contato, precisei pensar em uma forma nova de te propor coisas, e pensei em uma forma onde treino meu curso, e ainda inovo aqui</h2>
  <div id="areaBotoes">
    <button onclick="iniciar()">Começar</button>
  </div>
</div>

<script>
  const perguntas = [
    {
      texto: "Você gostou de ter ficado comigo a sós esse fds?",
      respostas: ["Sim", "Não", "sim e repetiria"]
    },
    {
      texto: "gostou de ter sentido coisas novas agora que conhece seu corpo um pouco melhor?",
      respostas: ["Muito", "sim", "Não"]
    },
    {
      texto: "gostou de ter bebido comigo ??",
      respostas: ["Sim", "Talvez", "Não"]
    }
  ];

  let index = 0;

  function iniciar() {
    mostrarPergunta();
  }

  function mostrarPergunta() {
    if (index >= perguntas.length) {
      mostrarFinal();
      return;
    }

    const p = perguntas[index];
    document.getElementById("texto").innerText = p.texto;

    const area = document.getElementById("areaBotoes");
    area.innerHTML = "";

    p.respostas.forEach(resposta => {
      const btn = document.createElement("button");
      btn.innerText = resposta;
      btn.onclick = () => responder();
      area.appendChild(btn);
    });
  }

  function responder() {
    index++;
    mostrarPergunta();
  }

  function mostrarFinal() {
    document.getElementById("texto").innerText = "Quer ir comigo hoje para um lugar reservado, beber cerveja fumar narguile e fazer uma coisa bem gostosa, sem compromisso (mas tem que ser tardeeeee)? ";

    const area = document.getElementById("areaBotoes");
    area.innerHTML = "";

    const sim = document.createElement("button");
    sim.innerText = "SIM ❤️";
    sim.onclick = () => {
      document.getElementById("texto").innerText = "se clicou no sim, agora me fala que está indo se arrumar, ou me liga pra gente combinar o horário 😏💖";
      area.innerHTML = "";
    };

    const nao = document.createElement("button");
    nao.innerText = "Não 😢";

    nao.onmouseover = () => {
      nao.style.position = "absolute";
      nao.style.top = Math.random() * 80 + "%";
      nao.style.left = Math.random() * 80 + "%";
    };

    area.appendChild(sim);
    area.appendChild(nao);
  }
</script>

</body>
</html>
